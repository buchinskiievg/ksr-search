name = "ksr-search"
main = "src/worker.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# D1 binding — items + examples
[[d1_databases]]
binding = "DB"
database_name = "ksr-search"
database_id = "e5e23ef3-a50f-4864-b4ed-9d9bcaec6efb"
migrations_dir = "migrations"

# Cloudflare Workers AI — built-in Llama 3.3 70B, called directly via the
# `AI` binding instead of going out to Groq/Gemini. Necessary because Groq
# blocks Cloudflare Worker IPs entirely (403 Forbidden) and Gemini refuses
# to serve our worker's APAC datacenter ("User location is not supported"
# 400). Workers AI is the only LLM that runs reliably from a Worker.
# Free tier: 10000 neurons/day, plenty for interactive use.
[ai]
binding = "AI"

# Public static assets (the SPA frontend served from the same Worker)
[assets]
directory = "./public"
binding = "ASSETS"

# Default model names — secrets set via `wrangler secret put`:
#   GROQ_API_KEY
#   GEMINI_API_KEY
[vars]
GROQ_MODEL = "llama-3.3-70b-versatile"
GEMINI_MODEL = "gemini-2.0-flash"

[observability]
enabled = true
